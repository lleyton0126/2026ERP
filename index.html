        { id: 'season', name: '旺季加價', amount: 500, enabled: false },
        { id: 'weekendOut', name: '去程週末出發', amount: 300, enabled: false },
        { id: 'weekendIn', name: '回程週末返回', amount: 300, enabled: false },
      ]);

      const [hotelId, setHotelId] = useState('hitachi');
      const [roomId, setRoomId] = useState('std_double_king');
      const [addBreakfast, setAddBreakfast] = useState(true); 
      
      // --- 機車選配模組狀態 ---
      const [addScooter, setAddScooter] = useState(false); 
      const [scooterCount, setScooterCount] = useState(1);
      const [overrideScooterCount, setOverrideScooterCount] = useState(false); 

      const [activeSupplierId, setActiveSupplierId] = useState('haian'); 
      const [selectedTours, setSelectedTours] = useState([]);

      const [markupValue, setMarkupValue] = useState(15);
      const [copied, setCopied] = useState(false);

      const basePax = useMemo(() => paxAdult + paxChild + paxSenior, [paxAdult, paxChild, paxSenior]);
      const totalPax = useMemo(() => basePax + paxInfant, [basePax, paxInfant]);
      const totalDays = useMemo(() => nights + 1, [nights]);

      // 機車台數自動化：依據人數兩人一台，無條件進位
      useEffect(() => {
        if (!overrideScooterCount) {
          setScooterCount(Math.ceil(basePax / 2) || 1);
        }
      }, [basePax, overrideScooterCount]);

      useEffect(() => {
        const brandData = flightBrands[flightBrand];
        const hasRoute = brandData.routes.some(r => r.id === flightId);
        if (!hasRoute) setFlightId(brandData.routes[0].id); 
      }, [flightBrand, flightId]);

      const handleHotelChange = (newHotelId) => {
        setHotelId(newHotelId);
        setRoomId(hotelsData[newHotelId].rooms[0].id);
        if (newHotelId === 'foung' || newHotelId === 'heyu') {
          setAddBreakfast(false); 
        } else {
          setAddBreakfast(true);
        }
      };

      const handleAdjustmentChange = (id, field, value) => {
        setFlightAdjustments(prev => prev.map(adj => adj.id === id ? { ...adj, [field]: value } : adj));
      };

      const toggleTour = (tourId) => {
        setSelectedTours(prev => prev.includes(tourId) ? prev.filter(id => id !== tourId) : [...prev, tourId]);
      };

      // 保險計算
      const insuranceCostPerPerson = useMemo(() => {
        const days = nights + 1;
        return days <= 2 ? 75 : 105 + (days - 3) * 30;
      }, [nights]);

      const checkInJudge = useMemo(() => {
        const d = new Date(startDateStr);
        if (isNaN(d.getTime())) return null;
        return hotelsData[hotelId].judge(d);
      }, [startDateStr, hotelId]);

      const tourSlicesCount = useMemo(() => {
        const counts = {};
        selectedTours.forEach(tourId => {
          const tour = localToursDatabase.find(t => t.id === tourId);
          if (tour) { counts[tour.supplierId] = (counts[tour.supplierId] || 0) + 1; }
        });
        return counts;
      }, [selectedTours]);

      // 機車成本計費引擎
      const scooterCalculations = useMemo(() => {
        if (!addScooter) return { totalCost: 0, costPerPax: 0, daysLabel: '自理', pricePerVehicle: 0 };
        let pricePerVehicle = 0;
        let label = '';
        if (transportType === 'flight') {
          pricePerVehicle = totalDays * 250;
          label = `${totalDays} 天 (整日計)`;
        } else {
          const fullDays = totalDays - 1;
          pricePerVehicle = (fullDays * 250) + 200;
          label = `${fullDays}.5 天 (${fullDays}天24h + 5h)`;
        }
        const totalCost = pricePerVehicle * scooterCount;
        return { 
          totalCost, 
          costPerPax: basePax > 0 ? (totalCost / basePax) : 0, 
          daysLabel: label, 
          pricePerVehicle 
        };
      }, [addScooter, transportType, totalDays, scooterCount, basePax]);

      const flightCalculations = useMemo(() => {
        const route = flightBrands[flightBrand].routes.find(r => r.id === flightId);
        if (!route || transportType === 'ferry') return { adult: 0, child: 0, senior: 0, infant: 0 };
        let extraSurcharge = flightAdjustments.filter(a => a.enabled).reduce((sum, a) => sum + Number(a.amount), 0);
        return {
          adult: route.prices.adult + extraSurcharge,
          child: route.prices.child + extraSurcharge,
          senior: route.prices.senior + extraSurcharge,
          infant: 500
        };
      }, [transportType, flightBrand, flightId, flightAdjustments]);

      const tourCalculations = useMemo(() => {
        let adultTourTotal = 0, childTourTotal = 0, seniorTourTotal = 0, infantTourTotal = 0, selectedTourDetails = [];
        selectedTours.forEach(tourId => {
          const tour = localToursDatabase.find(t => t.id === tourId);
          if (tour) {
            adultTourTotal += tour.prices.adult; childTourTotal += tour.prices.child; 
            seniorTourTotal += tour.prices.senior; infantTourTotal += tour.prices.infant;
            selectedTourDetails.push(tour);
          }
        });
        return { 
          adultTourTotal, childTourTotal, seniorTourTotal, infantTourTotal, 
          totalTourNet: (adultTourTotal * paxAdult) + (childTourTotal * paxChild) + (seniorTourTotal * paxSenior) + (infantTourTotal * paxInfant), 
          details: selectedTourDetails 
        };
      }, [selectedTours, paxAdult, paxChild, paxSenior, paxInfant]);

      // 大總決算
      const calculation = useMemo(() => {
        const d = new Date(startDateStr);
        if (isNaN(d.getTime()) || !checkInJudge || (basePax + paxInfant) === 0) return { error: true };
        const hotel = hotelsData[hotelId];
        const returnDate = new Date(d); returnDate.setDate(d.getDate() + nights);
        
        let transportTotalNet = 0, transportNetPerPax = { adult: 0, child: 0, senior: 0, infant: 0 };
        if (transportType === 'flight') {
          transportNetPerPax = { adult: flightCalculations.adult, child: flightCalculations.child, senior: flightCalculations.senior, infant: flightCalculations.infant };
          transportTotalNet = (transportNetPerPax.adult * paxAdult) + (transportNetPerPax.child * paxChild) + (transportNetPerPax.senior * paxSenior) + (transportNetPerPax.infant * paxInfant);
        } else {
          const boatPrice = ([0, 1, 2, 3, 4].includes(d.getDay()) ? 650 : 750) + ([2, 3, 4, 5, 6].includes(returnDate.getDay()) ? 650 : 750);
          transportNetPerPax = { adult: boatPrice, child: boatPrice, senior: boatPrice, infant: 200 };
          transportTotalNet = (boatPrice * basePax) + (200 * paxInfant);
        }

        let totalHotelCost = 0;
        let nightBreakdown = [];
        for (let i = 0; i < nights; i++) {
          const currentNight = new Date(d); currentNight.setDate(d.getDate() + i);
          const nightJudge = hotel.judge(currentNight);
          let nightPriceKey = '';
          
          if (hotelId === 'hitachi') {
            nightPriceKey = `${nightJudge.seasonKey}_${addBreakfast ? 'with_b' : 'no_b'}`;
          } else {
            nightPriceKey = nightJudge.priceKey;
          }
          
          const nightPrice = hotel.prices[roomId]?.[nightPriceKey] || 0;
          totalHotelCost += nightPrice * rooms;
          nightBreakdown.push({ 
            dateStr: `${currentNight.getMonth() + 1}/${currentNight.getDate()}`, 
            dayOfWeek: daysOfWeek[currentNight.getDay()], 
            label: nightJudge.label || nightJudge.priceKey, 
            price: nightPrice 
          });
        }

        const totalBreakfastCost = (hotelId !== 'hitachi' && !hotel.breakfastIncluded && addBreakfast) ? (hotel.breakfastCost * basePax * nights) : 0;
        const totalHotelAndBreakfastNet = totalHotelCost + totalBreakfastCost;
        const hotelNetPerPax = basePax > 0 ? (totalHotelAndBreakfastNet / basePax) : 0;
        const totalInsuranceNet = insuranceCostPerPerson * totalPax;

        // 加入機車均攤成本
        const netAdult = hotelNetPerPax + transportNetPerPax.adult + tourCalculations.adultTourTotal + scooterCalculations.costPerPax + insuranceCostPerPerson;
        const netChild = hotelNetPerPax + transportNetPerPax.child + tourCalculations.childTourTotal + scooterCalculations.costPerPax + insuranceCostPerPerson;
        const netSenior = hotelNetPerPax + transportNetPerPax.senior + tourCalculations.seniorTourTotal + scooterCalculations.costPerPax + insuranceCostPerPerson;
        const netInfant = transportNetPerPax.infant + tourCalculations.infantTourTotal + insuranceCostPerPerson;

        const getSellPrice = (net) => Math.ceil((net * (1 + markupValue / 100)) / 100) * 100;
        const sellPriceAdult = paxAdult > 0 ? getSellPrice(netAdult) : 0;
        const sellPriceChild = paxChild > 0 ? getSellPrice(netChild) : 0;
        const sellPriceSenior = paxSenior > 0 ? getSellPrice(netSenior) : 0;
        const sellPriceInfant = paxInfant > 0 ? Math.ceil(netInfant / 100) * 100 : 0;

        const totalSell = (sellPriceAdult * paxAdult) + (sellPriceChild * paxChild) + (sellPriceSenior * paxSenior) + (sellPriceInfant * paxInfant);
        const totalNet = totalHotelAndBreakfastNet + transportTotalNet + tourCalculations.totalTourNet + scooterCalculations.totalCost + totalInsuranceNet;

        return {
          nightBreakdown, totalHotelNet: totalHotelCost, totalBreakfastCost, transportTotalNet, tourTotalNet: tourCalculations.totalTourNet,
          totalInsuranceNet, totalNet, totalSell, profit: totalSell - totalNet,
          sellPriceAdult, sellPriceChild, sellPriceSenior, sellPriceInfant,
          transportNetPerPax, hotelNetPerPax, dayName: daysOfWeek[d.getDay()], returnDayName: daysOfWeek[returnDate.getDay()], error: false
        };
      }, [startDateStr, paxAdult, paxChild, paxSenior, paxInfant, basePax, rooms, nights, transportType, addBreakfast, hotelId, roomId, markupValue, checkInJudge, flightCalculations, tourCalculations, scooterCalculations, insuranceCostPerPerson, totalPax]);

      const filteredTours = useMemo(() => {
        return localToursDatabase.filter(t => t.supplierId === activeSupplierId);
      }, [activeSupplierId]);

      const handleCopy = () => {
        if (calculation.error) return;
        const hotel = hotelsData[hotelId];
        const room = hotel.rooms.find(r => r.id === roomId);
        
        let priceDetails = ``;
        if (paxAdult > 0) priceDetails += `成人 ${calculation.sellPriceAdult.toLocaleString()} 元/人\n`;
        if (paxChild > 0) priceDetails += `兒童 ${calculation.sellPriceChild.toLocaleString()} 元/人\n`;
        if (paxSenior > 0) priceDetails += `優待 ${calculation.sellPriceSenior.toLocaleString()} 元/人\n`;
        if (paxInfant > 0) priceDetails += `嬰兒 ${calculation.sellPriceInfant.toLocaleString()} 元/人\n`;

        const startLocation = transportType === 'flight' ? flightBrands[flightBrand].routes.find(r => r.id === flightId)?.name : '嘉義布袋港';
        const transText = transportType === 'flight' ? `${flightBrands[flightBrand].name}${startLocation}來回機票` : '嘉義布袋澎湖來回船票';
        const breakfastText = hotelId === 'hitachi' ? (addBreakfast ? '包含早餐' : '不含早餐') : (hotel.breakfastIncluded || addBreakfast ? '含早餐' : '不含早餐');

        let tourBulletPoints = '';
        if (tourCalculations.details.length > 0) {
          tourBulletPoints = tourCalculations.details.map(t => `*${t.name} - ${t.desc}`).join('\n') + '\n';
        }

        const text = `澎湖 ${totalDays}天${nights}夜 自由行報價\n\n🔺出發日期：${startDateStr.replace(/-/g, '/')} (${calculation.dayName ? calculation.dayName.replace('星期', '') : ''})\n\n🔺交通資訊\n出發地點：${startLocation}\n交通工具：${transText}\n本島交通：${addScooter ? `本島機車 ${scooterCount} 台` : '自理 (或未添加)'} \n\n🔺旅宿資訊：\n* 住宿飯店：${hotel.name}${room?.name ? room.name.replace(/\(.*?\)/g, '') : ''}\n* 住宿晚數：${nights} 晚 (${breakfastText})\n\n🔺報價金額： \n${priceDetails.trim()}\n\n🔺報價內容包含\n*${transText}\n*${hotel.name}住宿 ${nights} 晚 (${breakfastText})\n${addScooter ? `*本島機車租賃 ${scooterCount} 台 (${scooterCalculations.daysLabel})\n` : ''}${tourBulletPoints}*旅遊責任保險250萬+20萬\n\n🔺上述報價請參考，實際機(船)位與旅宿狀況，均以確認後訂出回覆為準。歡迎與我們討論並確認相關細節，預祝你有一個愉快的假期！`;

        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (err) {}
        document.body.removeChild(textArea);
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-800 font-sans">
          <div className="max-w-6xl mx-auto space-y-6">
            
            <div className="flex items-center justify-between border-b border-slate-200 pb-4">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 p-2.5 rounded-xl shadow-sm"><Calculator className="text-white w-6 h-6" /></div>
                <div>
                  <h1 className="text-xl font-bold text-slate-800">澎湖一站式報價系統</h1>
                  <span className="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded">v2026 ERP (包含八大飯店 - HTML/VSCode 穩定版)</span>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 space-y-6">
                
                {/* 1. 日期與人數 */}
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="flex items-center gap-2 font-bold mb-4 text-slate-700 text-sm"><Calendar className="w-4 h-4 text-indigo-500" /> 1. 日期與旅客結構</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div><label className="text-xs font-bold text-slate-400">出發日期</label><input type="date" value={startDateStr} onChange={(e) => setStartDateStr(e.target.value)} className="w-full mt-1 p-2.5 bg-slate-50 border rounded-lg font-medium outline-none text-sm" /></div>
                    <div><label className="text-xs font-bold text-slate-400">住宿晚數</label><input type="number" min="1" value={nights} onChange={(e) => setNights(Number(e.target.value))} className="w-full mt-1 p-2.5 bg-slate-50 border rounded-lg font-bold outline-none text-center text-sm" /></div>
                  </div>
                  <div className="bg-slate-50 p-3 rounded-lg border text-xs grid grid-cols-4 gap-2">
                    <div><span className="block font-bold text-slate-500 text-center mb-1">成人</span><input type="number" min="0" value={paxAdult} onChange={(e) => setPaxAdult(Math.max(0, Number(e.target.value)))} className="w-full text-center font-bold p-1.5 border rounded" /></div>
                    <div><span className="block font-bold text-slate-500 text-center mb-1">兒童</span><input type="number" min="0" value={paxChild} onChange={(e) => setPaxChild(Math.max(0, Number(e.target.value)))} className="w-full text-center font-bold p-1.5 border rounded" /></div>
                    <div><span className="block font-bold text-slate-500 text-center mb-1">長者</span><input type="number" min="0" value={paxSenior} onChange={(e) => setPaxSenior(Math.max(0, Number(e.target.value)))} className="w-full text-center font-bold p-1.5 border rounded" /></div>
                    <div><span className="block font-bold text-amber-600 text-center mb-1 flex justify-center"><Baby className="w-3 h-3"/>嬰兒</span><input type="number" min="0" value={paxInfant} onChange={(e) => setPaxInfant(Math.max(0, Number(e.target.value)))} className="w-full text-center font-bold p-1.5 border rounded" /></div>
                  </div>
                </div>

                {/* 2. 住宿選擇 */}
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="flex items-center gap-2 font-bold mb-4 text-slate-700 text-sm"><Building className="w-4 h-4 text-indigo-500" /> 2. 住宿選擇區</h2>
                  <div className="grid grid-cols-2 gap-4 mb-3">
                    <select value={hotelId} onChange={(e) => handleHotelChange(e.target.value)} className="p-2.5 bg-slate-50 border rounded-lg font-bold text-sm outline-none">{Object.values(hotelsData).map(h => <option key={h.id} value={h.id}>{h.name}</option>)}</select>
                    <select value={roomId} onChange={(e) => setRoomId(e.target.value)} className="p-2.5 bg-slate-50 border rounded-lg font-bold text-sm outline-none">{hotelsData[hotelId].rooms.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select>
                  </div>
                  <div className="flex items-center justify-between border-t pt-3 text-xs">
                    <div className="flex items-center gap-2"><span className="font-bold text-slate-600">需求間數:</span><input type="number" min="1" value={rooms} onChange={(e) => setRooms(Number(e.target.value))} className="w-12 p-1.5 border rounded text-center font-bold" /></div>
                    {(hotelId === 'hitachi' || !hotelsData[hotelId].breakfastIncluded) && (
                      <label className="flex items-center gap-2 cursor-pointer bg-slate-50 px-3 py-1.5 rounded-lg border">
                        <input type="checkbox" checked={addBreakfast} onChange={(e) => setAddBreakfast(e.target.checked)} className="w-3.5 h-3.5 text-indigo-600 rounded" />
                        <span className="font-bold text-slate-600">{hotelId === 'hitachi' ? '專案含早餐' : `加購早餐 ($${hotelsData[hotelId].breakfastCost})`}</span>
                      </label>
                    )}
                  </div>
                </div>

                {/* 3. 交通設定 */}
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="flex items-center gap-2 font-bold mb-4 text-slate-700 text-sm"><Plane className="w-4 h-4 text-indigo-500" /> 3. 大眾交通設定</h2>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                    <div className="flex p-1 bg-slate-100 rounded-lg h-[42px]">
                      <button onClick={() => setTransportType('flight')} className={`flex-1 rounded text-xs font-bold ${transportType === 'flight' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>機票</button>
                      <button onClick={() => setTransportType('ferry')} className={`flex-1 rounded text-xs font-bold ${transportType === 'ferry' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>船票</button>
                    </div>
                    {transportType === 'flight' ? (
                      <>
                        <select value={flightBrand} onChange={(e) => setFlightBrand(e.target.value)} className="p-2 bg-slate-50 border rounded-lg font-bold text-xs h-[42px] outline-none"><option value="uniair">立榮航空</option><option value="mandarin">華信航空</option></select>
                        <select value={flightId} onChange={(e) => setFlightId(e.target.value)} className="p-2 bg-slate-50 border rounded-lg font-bold text-xs h-[42px] outline-none">{flightBrands[flightBrand].routes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select>
                      </>
                    ) : (
                      <div className="sm:col-span-2 flex items-center gap-2 px-3 text-xs text-indigo-600 font-bold bg-indigo-50 rounded-lg border border-indigo-100"><Ship className="w-4 h-4" /> 返台日：{calculation.returnDayName || ''}</div>
                    )}
                  </div>
                </div>

                {/* 3.5 機車選配 */}
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                  <div className="flex items-center justify-between">
                    <h2 className="flex items-center gap-2 font-bold text-slate-700 text-sm"><Bike className="w-4 h-4 text-indigo-500" /> 3.5 本島機車租賃 (可選配)</h2>
                    <button onClick={() => setAddScooter(!addScooter)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${addScooter ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-500 border hover:bg-slate-200'}`}>
                      {addScooter ? '✓ 已添加' : '+ 添加機車'}
                    </button>
                  </div>
                  {addScooter ? (
                    <div className="bg-slate-50 p-3 rounded-lg border space-y-2 text-xs">
                      <div className="text-indigo-700 font-bold">按 <span className="text-red-500 font-black">{scooterCalculations.daysLabel}</span> 計費，每台成本 $${scooterCalculations.pricePerVehicle}。</div>
                      <div className="flex items-center gap-3">
                        <label className="flex items-center gap-1.5 text-slate-600 font-bold cursor-pointer"><input type="checkbox" checked={overrideScooterCount} onChange={(e) => setOverrideScooterCount(e.target.checked)} className="rounded" />自訂數量</label>
                        {overrideScooterCount ? (
                          <div className="flex items-center gap-1"><input type="number" min="1" value={scooterCount} onChange={(e) => setScooterCount(Math.max(1, Number(e.target.value)))} className="w-14 p-1 text-center font-bold border rounded" /> 台</div>
                        ) : (<span className="text-slate-500">自動分配：<span className="font-bold">{scooterCount}</span> 台</span>)}
                      </div>
                    </div>
                  ) : (
                    <div className="text-xs text-slate-400 bg-slate-50 p-3 rounded-lg border border-dashed flex justify-center">未添加，報價單將顯示為自理。</div>
                  )}
                </div>

                {/* 4. 當地遊程 */}
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                  <div className="flex items-center justify-between mb-3"><h2 className="flex items-center gap-2 font-bold text-slate-700 text-sm"><MapIcon className="w-4 h-4 text-indigo-500" /> 4. 當地行程 (二級選單)</h2><span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">已選 {selectedTours.length}</span></div>
                  <div className="flex flex-wrap gap-1 p-1 bg-slate-100 rounded-lg mb-3">
                    {tourSuppliers.map(supplier => {
                      const count = tourSlicesCount[supplier.id] || 0;
                      const isActive = activeSupplierId === supplier.id;
                      return (
                        <button key={supplier.id} onClick={() => setActiveSupplierId(supplier.id)} className={`px-2.5 py-1.5 rounded text-[11px] font-bold transition-all flex items-center gap-1 ${isActive ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                          {supplier.name} {count > 0 && <span className="bg-indigo-600 text-white text-[9px] px-1.5 rounded-full">{count}</span>}
                        </button>
                      );
                    })}
                  </div>
                  <div className="space-y-1.5 max-h-[220px] overflow-y-auto pr-1 no-scrollbar">
                    {filteredTours.length === 0 ? <p className="text-xs text-center text-slate-400 py-4">無項目</p> : filteredTours.map(tour => {
                      const isSelected = selectedTours.includes(tour.id);
                      return (
                        <div key={tour.id} onClick={() => toggleTour(tour.id)} className={`p-2.5 rounded-lg border text-xs cursor-pointer flex justify-between gap-2 ${isSelected ? 'border-indigo-500 bg-indigo-50/30' : 'bg-white hover:border-indigo-200'}`}>
                          <div className="flex items-start gap-2">
                            <div className={`w-3.5 h-3.5 mt-0.5 rounded border flex items-center justify-center text-[9px] ${isSelected ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>{isSelected && '✓'}</div>
                            <div><span className="font-bold text-slate-700 block leading-tight">{tour.name}</span><span className="text-[10px] text-slate-400 mt-0.5 block">{tour.desc}</span></div>
                          </div>
                          <div className="font-mono text-[10px] text-slate-400 whitespace-nowrap pt-0.5">成 <span className="font-bold text-slate-700">${tour.prices.adult}</span></div>
                        </div>
                      );
                    })}
                  </div>
                </div>

              </div>

              {/* 右側：看板 */}
              <div className="space-y-6">
                <div className="bg-slate-800 rounded-3xl p-6 text-white shadow-xl sticky top-6">
                  
                  <div className="space-y-2.5 mb-5 pb-5 border-b border-slate-700">
                    <h3 className="text-slate-400 text-[11px] font-bold uppercase">分流建議售價 (SRP)</h3>
                    {paxAdult > 0 && <div className="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg border border-slate-700/50"><span className="text-slate-300 text-xs font-bold">👩 成人</span><span className="text-lg font-black text-amber-400">${calculation.sellPriceAdult?.toLocaleString()}</span></div>}
                    {paxChild > 0 && <div className="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg border border-slate-700/50"><span className="text-slate-300 text-xs font-bold">👦 兒童</span><span className="text-lg font-black text-sky-400">${calculation.sellPriceChild?.toLocaleString()}</span></div>}
                    {paxSenior > 0 && <div className="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg border border-slate-700/50"><span className="text-slate-300 text-xs font-bold">👵 優待</span><span className="text-lg font-black text-emerald-400">${calculation.sellPriceSenior?.toLocaleString()}</span></div>}
                    {paxInfant > 0 && <div className="flex justify-between items-center bg-amber-950/20 p-2 rounded-lg border border-amber-900/30 text-[11px] text-amber-500"><span>👶 嬰兒 (實收)</span><span className="font-black">${calculation.sellPriceInfant?.toLocaleString()}</span></div>}
                  </div>

                  <div className="space-y-2 mb-5 text-[11px] text-slate-300">
                    <div className="flex justify-between"><span className="font-bold">全團總售價</span><span className="text-sm font-black text-white">${calculation.totalSell?.toLocaleString()}</span></div>
                    <div className="flex justify-between"><span>同業總成本 (NET)</span><span>${calculation.totalNet?.toLocaleString()}</span></div>
                    <div className="flex justify-between p-2 bg-emerald-500/10 rounded border border-emerald-500/20 text-emerald-400 font-bold"><span>預估總毛利</span><span>${calculation.profit?.toLocaleString()}</span></div>
                  </div>
                  
                  <div className="space-y-3">
                    <div className="space-y-1"><label className="text-[10px] text-slate-400 font-bold">設定毛利: {markupValue}%</label><input type="range" min="0" max="40" value={markupValue} onChange={(e) => setMarkupValue(Number(e.target.value))} className="w-full accent-indigo-500" /></div>
                    <button onClick={handleCopy} className={`w-full py-3.5 rounded-xl font-black text-sm flex items-center justify-center gap-2 transition-all ${copied ? 'bg-emerald-500' : 'bg-indigo-500 hover:bg-indigo-400'}`}>{copied ? <CheckCircle2 className="w-4 h-4"/> : <Copy className="w-4 h-4"/>} {copied ? '已複製' : '一鍵複製報價明細'}</button>
                  </div>

                  {!calculation.error && (
                    <div className="mt-5 pt-4 border-t border-slate-700 text-[10px] text-slate-400 space-y-2">
                      <div className="font-bold text-white flex items-center gap-1"><ShieldCheck className="w-3.5 h-3.5 text-indigo-400"/>單人 NET 拆解</div>
                      <div className="bg-slate-900 p-2.5 rounded-lg border border-slate-700 space-y-1 font-mono">
                        <div className="flex justify-between text-indigo-300"><span>🏨 住宿均攤</span><span>${Math.round(calculation.hotelNetPerPax)}</span></div>
                        {addScooter && <div className="flex justify-between text-amber-400"><span>🏍️ 機車均攤</span><span>${Math.round(scooterCalculations.costPerPax)}</span></div>}
                        <div className="flex justify-between text-sky-400"><span>🛡️ 責任險</span><span>${insuranceCostPerPerson}</span></div>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
